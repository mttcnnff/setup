# Prefix: Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes
unbind '"'
unbind %
bind -  split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Switch sessions with Ctrl+Shift+Alt+Arrow
bind -n C-S-M-Left  switch-client -p
bind -n C-S-M-Right switch-client -n

# Status bar at the bottom
set -g status on
set -g status-position bottom
set -g status-interval 1

# Status bar base colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: live session list via shell command
# Active session highlighted in blue, others dimmed
set -g status-left "#(tmux list-sessions -F '#{?session_active,#[bold fg=white bg=#1e5799], #[fg=#6c7086 bg=#1e1e2e]} #{session_name} #[default]' 2>/dev/null | tr -d '\n')"
set -g status-left-length 200

# Hide the window list (we're using sessions instead)
set -g window-status-format ""
set -g window-status-current-format ""

# Right: clock
set -g status-right "#[fg=#89b4fa,bg=#1e1e2e] %H:%M:%S "
set -g status-right-length 20

set -g base-index 1
setw -g pane-base-index 1
